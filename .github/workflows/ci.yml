name: CI - Task Manager Flask

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build, validação e testes da aplicação Flask
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Validar sintaxe do projeto
        run: python -m compileall todo_project

      - name: Executar testes automatizados
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validar inicialização da aplicação
        run: |
          cd todo_project
          python -c "from todo_project import app; print('Aplicação Flask importada com sucesso:', app.name)"

  sast:
    name: SAST e análise de dependências
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Instalar ferramentas de segurança
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Executar Bandit
        run: bandit -r todo_project/todo_project -f txt
        continue-on-error: true

      - name: Executar OWASP Dependency-Check
        run: |
          mkdir -p dependency-check-report
          docker run --rm \
            -v "${{ github.workspace }}":/src \
            -v "${{ github.workspace }}/dependency-check-report":/report \
            owasp/dependency-check:latest \
            --project "Task Manager Flask" \
            --scan /src \
            --out /report \
            --format "HTML" \
            --enableExperimental \
            --failOnCVSS 11
        continue-on-error: true

      - name: Executar pip-audit complementar
        run: pip-audit -r requirements.txt
        continue-on-error: true
