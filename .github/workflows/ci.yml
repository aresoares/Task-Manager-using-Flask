name: CI - Task Manager Flask

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build, validação e testes da aplicação Flask
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Validar sintaxe do projeto
        run: python -m compileall todo_project

      - name: Executar testes automatizados
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validar inicialização da aplicação
        run: |
          cd todo_project
          python -c "from todo_project import app; print('Aplicação Flask importada com sucesso:', app.name)"

  sast:
    name: SAST e análise de dependências
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Instalar ferramentas de segurança
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Preparar pasta de relatórios
        run: mkdir -p security-reports

      - name: Executar Bandit
        run: |
          bandit -r todo_project/todo_project -f txt -o security-reports/bandit-report.txt || true

      - name: Executar OWASP Dependency-Check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/src \
            -v "${{ github.workspace }}/security-reports":/report \
            owasp/dependency-check:latest \
            --project "Task Manager Flask" \
            --scan /src \
            --out /report \
            --format "HTML" \
            --format "JSON" \
            --enableExperimental \
            --failOnCVSS 11 || true

      - name: Executar pip-audit complementar
        run: |
          pip-audit -r requirements.txt > security-reports/pip-audit-report.txt || true

      - name: Gerar resumo da Etapa 4
        run: |
          echo "# Resumo da Etapa 4 - SAST e Dependências" > security-reports/resumo-etapa-4.md
          echo "" >> security-reports/resumo-etapa-4.md
          echo "Projeto: Task Manager using Flask" >> security-reports/resumo-etapa-4.md
          echo "Ferramentas executadas: Bandit, OWASP Dependency-Check e pip-audit." >> security-reports/resumo-etapa-4.md
          echo "" >> security-reports/resumo-etapa-4.md
          echo "Relatórios gerados:" >> security-reports/resumo-etapa-4.md
          echo "- bandit-report.txt" >> security-reports/resumo-etapa-4.md
          echo "- dependency-check-report.html" >> security-reports/resumo-etapa-4.md
          echo "- dependency-check-report.json" >> security-reports/resumo-etapa-4.md
          echo "- pip-audit-report.txt" >> security-reports/resumo-etapa-4.md
          cat security-reports/resumo-etapa-4.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar relatórios de segurança
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: security-reports/
